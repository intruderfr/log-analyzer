name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.19'
    
    - name: Build
      run: go build -v ./...
    
    - name: Test
      run: go test -v ./...
    
    - name: Test with sample log
      run: |
        go build -o log-analyzer main.go
        ./log-analyzer -file=examples/sample.log -verbose
        ./log-analyzer -file=examples/sample.log -config=examples/custom-patterns.json -output=test-output.json
        cat test-output.json

  build-releases:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.19'
    
    - name: Build for multiple platforms
      run: |
        GOOS=linux GOARCH=amd64 go build -o log-analyzer-linux-amd64 main.go
        GOOS=darwin GOARCH=amd64 go build -o log-analyzer-darwin-amd64 main.go
        GOOS=windows GOARCH=amd64 go build -o log-analyzer-windows-amd64.exe main.go
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: binaries
        path: |
          log-analyzer-*